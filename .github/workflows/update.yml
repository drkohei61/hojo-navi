name: 補助金データ自動更新

on:
  schedule:
    # 毎月1日・15日 午前9時（JST = UTC+9 → UTC 0時）に実行
    - cron: '0 0 1 * *'
    - cron: '0 0 15 * *'
  workflow_dispatch:
    # 手動実行も可能（GitHubのActionsタブから「Run workflow」で即実行）

jobs:
  update-subsidies:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # JSONファイルを更新するために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: |
          pip install requests beautifulsoup4 lxml

      - name: スクレイピング実行
        run: python scraper.py

      - name: 変更があればコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subsidies_data.json
          if git diff --staged --quiet; then
            echo "変更なし。スキップします。"
          else
            git commit -m "🔄 補助金データ自動更新 $(date +'%Y-%m-%d')"
            git push
          fi
